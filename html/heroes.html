<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Heroes of the Storm — Герои</title>
</head>

<body>
    <input class="theme-switch" type="checkbox" id="themeSwitch">

    <div class="page">
        <div class="parallax-scene" aria-hidden="true">
            <div class="parallax-layer layer-aurora" data-parallax="0.08"></div>
            <div class="parallax-layer layer-nebula" data-parallax="0.18"></div>
            <div class="parallax-layer layer-rays" data-parallax="0.28"></div>
            <canvas id="storm-canvas"></canvas>
        </div>

        <div id="header-container"></div>
        <div id="hero-banner-container"></div>

        <main class="site-main">
            <div class="container wide-container" id="page-content"></div>
        </main>

        <div id="footer-container"></div>
    </div>

    <script type="module" src="../js/main.js"></script>
</body>

</html>
